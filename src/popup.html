<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dumpster</title>
    <link rel="stylesheet" href="pages.css" />
  </head>
  <body class="popup-page">
    <div class="popup">
      <header class="popup-head">
        <span class="brand-mark" aria-hidden="true"><img src="../assets/icon.svg" alt="" /></span>
        <strong>Dumpster</strong>
        <label class="switch switch-sm">
          <input type="checkbox" id="enabled" />
          <span class="switch-track"><span class="switch-thumb"></span></span>
        </label>
      </header>

      <div class="popup-bins" id="bins"></div>

      <p class="popup-status" id="status"></p>

      <button type="button" class="btn btn-ghost btn-block" id="options">
        Manage bins &amp; settings
      </button>
    </div>

    <script src="common.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
